services:
  php:
    build: ./php
    working_dir: /var/www/html
    volumes:
      - ../public:/var/www/html:ro
      - php:/run/php
    networks:
      - php
      - postgres
    ports:
      - "9000:9000"
  httpd:
    build: ./httpd
    working_dir: /var/www/html
    volumes:
      - ../public:/var/www/html:ro
      - php:/run/php
    networks:
      - php
    ports:
      - "80:80"
      - "443:443"
  postgres:
    build: ./postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres:/var/lib/postgresql
    networks:
      - postgres
    ports:
      - "5432:5432"

volumes:
  php:
  postgres:
networks:
  php:
  postgres: