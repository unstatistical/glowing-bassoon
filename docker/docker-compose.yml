services:
  php:
    build: ./php
    volumes:
      - ../public:/var/www/html
      - php:/run/php
    depends_on:
      - postgres
    networks:
      - php
      - postgres
  httpd:
    build: ./httpd
    volumes:
      - ../public:/var/www/html
      - php:/run/php
    depends_on:
      - php
    networks:
      - php
    ports:
      - "80:80"
  postgres:
    build: ./postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres:/var/lib/postgresql
    networks:
      - postgres
    ports:
      - "5432:5432"

volumes:
  php:
  postgres:
networks:
  php:
  postgres: