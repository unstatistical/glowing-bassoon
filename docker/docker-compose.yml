services:
  php:
    build: ./php
    working_dir: /var/www/html
    env_file: .env
    volumes:
      - ../public:/var/www/html
      - php:/run/php
    networks:
      - php
      - postgres
    expose:
      - ${PHP_PORT}
  httpd:
    build: ./httpd
    working_dir: /var/www/html
    volumes:
      - ../public:/var/www/html
      - php:/run/php
    networks:
      - php
    expose:
      - ${HTTPD_PORT}
    ports:
      - "${HTTPD_PORT}:${HTTPD_PORT}"
  postgres:
    build: ./postgres
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres:/var/lib/postgresql
    networks:
      - postgres
    expose:
      - ${POSTGRES_PORT}

volumes:
  php:
  postgres:
networks:
  php:
  postgres: