services:
  php:
    build: ./docker/php
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html:ro
      - php:/run/php
    networks:
      - php
      - postgres
    ports:
      - "9000:9000"
  httpd:
    image: httpd:2.4.66-trixie
    working_dir: /usr/local/apache2/htdocs
    volumes:
      - .:/var/www/html:ro
      - ./docker/httpd/extra/proxy-php.conf:/usr/local/apache2/conf/extra/proxy-php.conf:ro
      - ./docker/httpd/httpd.conf:/usr/local/apache2/conf/httpd.conf
      - php:/run/php
    networks:
      - php
    ports:
      - "80:80"
      - "443:443"
  postgres:
    image: postgres:18.3-trixie
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres:/var/lib/postgresql
    networks:
      - postgres
    ports:
      - "5432:5432"

volumes:
  php:
  postgres:
networks:
  php:
  postgres: